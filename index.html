<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-MSN</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>

<div class="card">
    <h1>Auto-MSN</h1>
    <h4>MSN automatic news opener, free to use</h4>

    <div class="setting">
        <label>Delay: <span id="val">6</span> Seconds</label>
        <input type="range" id="timer" min="3" max="15" value="6">
    </div>

    <div class="setting">
        <label>Tabs to open(won't get repeated if value ≤ 50):</label>
        <input type="number" id="limit" min="1" max="50" value="10">
    </div>

    <div class="btn-box">
        <button id="start">START</button>
        <button id="stop">STOP</button>
    </div>
    
    <h4>This project is not affiliated with Microsoft, Bing, Edge, or Rewards</h4>
    <div id="status">Idle</div>
    <h4>Made by <a href="https://github.com/abdeh24" target="_blank">Abdeh</a></h4>
  </div>
  <script src="src/script.js"></script>
</body>
</html>
